<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>베네수엘라 전자투표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e0e5ec;
        }
        .neumorphic-shadow {
            box-shadow: 8px 8px 16px #c5c9d0, -8px -8px 16px #fbffff;
        }
        .neumorphic-shadow-inset {
            box-shadow: inset 6px 6px 12px #c5c9d0, inset -6px -6px 12px #fbffff;
        }
        .machine-body {
            background-color: #e0e5ec;
            position: relative;
        }
        .screen-bezel {
            background: #3c4a5c;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.4);
        }
        .screen {
            background: #2d3748;
            height: 300px;
            border: 2px solid #1a202c;
            box-shadow: inset 0 0 10px #000;
        }
        .printer-slot {
            background: linear-gradient(to right, #4a5568, #2d3748, #4a5568);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .receipt {
            background-color: #fffff2;
            transform-origin: top;
            transition: transform 1.5s ease-out, opacity 1s ease-out;
            transform: translateY(-30px) scaleY(0);
            opacity: 0;
            z-index: 5;
            font-family: 'Courier New', Courier, monospace;
        }
        .receipt.printing {
            transform: translateY(0) scaleY(1);
            opacity: 1;
        }
        .candidate-board {
            background-color: #e9eef2;
            position: relative;
        }
        .board-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(233, 238, 242, 0.8);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.3s;
        }
        .candidate-cell {
            background-color: white;
            border: 2px solid #b0b8c0;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .candidate-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        .candidate-cell.selected {
             border: 3px solid #ff0000;
        }
        .blue-accent {
            background: linear-gradient(145deg, #0d47a1, #1976d2);
        }
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
        #photo-drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 w-full max-w-7xl mx-auto">
        <!-- 왼쪽: 투표기 및 관리 패널 -->
        <div class="space-y-8">
            <!-- 투표기 본체 (이전과 동일) -->
            <div class="machine-body rounded-2xl neumorphic-shadow">
                 <div class="screen-bezel rounded-t-2xl p-5">
                    <div id="screen" class="screen rounded-lg flex flex-col items-center justify-center p-4 text-white">
                        <div id="screen-initial" class="text-center">
                            <h2 class="text-2xl font-bold text-gray-300">투표 시스템</h2>
                            <p class="text-gray-400 mt-2">'투표 시작' 버튼을 눌러주세요.</p>
                        </div>
                        <div id="screen-selection" class="hidden text-center"></div>
                        <div id="screen-voted" class="hidden text-center">
                             <svg class="w-16 h-16 text-green-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <h2 class="text-2xl font-bold text-green-300">투표 완료!</h2>
                            <p class="text-gray-400 mt-2 animate-pulse">영수증 인쇄 중...</p>
                        </div>
                    </div>
                </div>
                <div class="p-4">
                    <div class="printer-slot h-3 w-3/4 mx-auto rounded"></div>
                    <div class="blue-accent h-16 rounded-b-2xl mt-4 flex items-center justify-center">
                        <span class="text-white font-bold text-lg">Smartmatic</span>
                    </div>
                </div>
                <div id="receipt" class="receipt w-2/3 mx-auto absolute left-0 right-0 top-full mt-[-80px] p-4"></div>
            </div>
            <!-- 관리 패널 -->
            <div class="candidate-board rounded-2xl p-5 neumorphic-shadow">
                <h2 class="text-xl font-bold text-gray-700 mb-4 pb-2 border-b-2">관리 패널</h2>
                <!-- 투표 절차 (이전과 동일) -->
                <div class="mb-6">
                    <h3 class="font-bold text-gray-600 mb-3">투표 절차</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                        <button id="start-voting-button" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg neumorphic-shadow transition-colors">투표 시작</button>
                        <button id="retake-vote-button" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-lg neumorphic-shadow transition-colors hidden">재투표</button>
                        <button id="end-voting-button" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg neumorphic-shadow transition-colors hidden">투표 종료</button>
                    </div>
                </div>
                <!-- 후보자 목록 관리 -->
                <div>
                     <h3 class="font-bold text-gray-600 mb-3">후보자 목록 관리</h3>
                    <form id="candidate-form" class="space-y-4">
                        <!-- 입력 필드들 (이전과 동일) -->
                        <input id="candidate-name" type="text" placeholder="후보자 이름" class="w-full p-3 rounded-lg neumorphic-shadow-inset bg-transparent" required>
                        <input id="party-name" type="text" placeholder="정당 이름" class="w-full p-3 rounded-lg neumorphic-shadow-inset bg-transparent" required>
                        <div class="flex items-center gap-4">
                            <label for="party-color" class="font-semibold text-gray-600">정당 색상:</label>
                            <input id="party-color" type="color" value="#c92a2a" class="w-12 h-12 rounded-lg cursor-pointer overflow-hidden border-2 border-transparent neumorphic-shadow">
                        </div>
                        <div id="photo-drop-zone" class="border-2 border-dashed border-gray-400 rounded-lg p-4 text-center cursor-pointer hover:border-blue-500 transition-colors">
                             <label for="candidate-photo" class="font-semibold text-gray-600 mb-2 block cursor-pointer">후보자 사진 (선택 사항)</label>
                             <div id="drop-zone-prompt">
                                <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                 <p class="text-gray-500 mt-2">여기에 파일을 드래그 앤 드롭하거나<br><span class="text-blue-500 font-semibold">클릭하여 선택하세요.</span></p>
                             </div>
                             <input id="candidate-photo" type="file" accept="image/*" class="hidden">
                             <img id="photo-preview" src="" alt="사진 미리보기" class="hidden max-h-24 mx-auto mt-2 rounded">
                        </div>
                        <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg neumorphic-shadow transition-colors">후보자 추가</button>
                    </form>
                    <!-- NEW: 파일 관리 버튼 -->
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button type="button" id="export-button" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 rounded-lg neumorphic-shadow transition-colors">목록 내보내기</button>
                        <button type="button" id="import-button" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-lg neumorphic-shadow transition-colors">목록 불러오기</button>
                        <input type="file" id="import-file-input" class="hidden" accept=".json">
                    </div>
                    <button type="button" id="reset-candidates-button" class="w-full bg-gray-700 hover:bg-gray-800 text-white font-bold py-3 rounded-lg neumorphic-shadow transition-colors mt-2">전체 초기화</button>
                </div>
            </div>
            <!-- 투표 집계 패널 (이전과 동일) -->
            <div class="candidate-board rounded-2xl p-5 neumorphic-shadow">
                <h2 class="text-xl font-bold text-gray-700 mb-4 pb-2 border-b-2">투표 집계</h2>
                <div class="mb-4">
                    <span class="font-bold text-gray-600">총 투표 수:</span>
                    <span id="total-votes" class="font-bold text-2xl text-blue-600">0</span>
                </div>
                <div id="tally-results" class="space-y-4"></div>
            </div>
        </div>

        <!-- 오른쪽: 후보자 선택 보드 (이전과 동일) -->
        <div class="candidate-board rounded-2xl p-3 neumorphic-shadow w-full">
             <div id="board-overlay" class="board-overlay rounded-2xl">
                <p id="overlay-text" class="text-2xl font-bold text-gray-800 bg-white/50 px-6 py-3 rounded-xl">투표 시작 버튼을 눌러주세요.</p>
            </div>
            <div class="bg-white p-1 mb-2">
                <img src="https://placehold.co/600x40/003366/FFFFFF?text=TARJETA+ELECTORAL" class="w-full" alt="Ballot Title"/>
            </div>
            <div id="candidate-grid" class="grid grid-cols-4 gap-2 min-h-[300px]"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const candidateForm = document.getElementById('candidate-form');
            const candidateGrid = document.getElementById('candidate-grid');
            const resetCandidatesButton = document.getElementById('reset-candidates-button');
            const startVotingButton = document.getElementById('start-voting-button');
            const endVotingButton = document.getElementById('end-voting-button');
            const retakeVoteButton = document.getElementById('retake-vote-button');
            const boardOverlay = document.getElementById('board-overlay');
            const overlayText = document.getElementById('overlay-text');
            const screenInitial = document.getElementById('screen-initial');
            const screenSelection = document.getElementById('screen-selection');
            const screenVoted = document.getElementById('screen-voted');
            const receipt = document.getElementById('receipt');
            const totalVotesEl = document.getElementById('total-votes');
            const tallyResultsEl = document.getElementById('tally-results');
            const photoDropZone = document.getElementById('photo-drop-zone');
            const photoPreview = document.getElementById('photo-preview');
            const dropZonePrompt = document.getElementById('drop-zone-prompt');
            const candidatePhotoInput = document.getElementById('candidate-photo');
            const exportButton = document.getElementById('export-button');
            const importButton = document.getElementById('import-button');
            const importFileInput = document.getElementById('import-file-input');

            let candidates = [];
            let totalVotes = 0;
            let selectedCandidate = null;
            let isVotingProcess = false;
            let nextId = 1;
            let votingState = 'inactive';
            const STORAGE_KEY = 'votingSimulatorData';

            // --- 데이터 관리 함수 ---
            const saveState = () => {
                const state = { candidates, totalVotes };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            };

            const loadState = () => {
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    const state = JSON.parse(savedData);
                    candidates = state.candidates || [];
                    totalVotes = state.totalVotes || 0;
                    if (candidates.length > 0) {
                        nextId = Math.max(...candidates.map(c => c.id)) + 1;
                    }
                }
            };
            
            // --- 렌더링 함수 (이전과 동일) ---
            const renderCandidates = () => {
                const TOTAL_CELLS = 16;
                candidateGrid.innerHTML = '';
                for (let i = 0; i < TOTAL_CELLS; i++) {
                    if (i < candidates.length) {
                        const c = candidates[i];
                        const cell = document.createElement('div');
                        cell.className = 'candidate-cell rounded aspect-[3/4]';
                        cell.dataset.id = c.id;
                        cell.innerHTML = `
                            <img src="${c.photo}" alt="${c.name}" class="w-full h-[55%] object-cover">
                            <p class="text-center font-bold text-black text-[10px] py-1">${c.name}</p>
                            <div class="party-banner w-full text-center text-white font-bold text-sm mt-auto flex-grow flex items-center justify-center" style="background-color: ${c.color};">${c.party}</div>
                        `;
                        cell.addEventListener('click', () => handleCandidateSelection(c, cell));
                        candidateGrid.appendChild(cell);
                    } else {
                        const placeholder = document.createElement('div');
                        placeholder.className = 'candidate-cell rounded bg-gray-200/50 neumorphic-shadow-inset aspect-[3/4]';
                        candidateGrid.appendChild(placeholder);
                    }
                }
            };

            const renderTally = () => {
                totalVotesEl.textContent = totalVotes;
                tallyResultsEl.innerHTML = '';

                // '투표 종료' 상태일 때만 상세 결과를 보여줍니다.
                if (votingState === 'ended') {
                    if (candidates.length === 0) {
                         tallyResultsEl.innerHTML = `<p class="text-center text-gray-500">후보자가 없습니다.</p>`;
                         return;
                    }
                    const sortedCandidates = [...candidates].sort((a, b) => (b.votes || 0) - (a.votes || 0));
                    sortedCandidates.forEach(c => {
                        const votes = c.votes || 0;
                        const percentage = totalVotes > 0 ? ((votes / totalVotes) * 100).toFixed(1) : 0;
                        const tallyItem = document.createElement('div');
                        tallyItem.innerHTML = `
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-sm">${c.name}</span>
                                <span class="text-sm font-semibold">${votes}표 (${percentage}%)</span>
                            </div>
                            <div class="w-full bg-gray-300 rounded-full h-4 neumorphic-shadow-inset">
                                <div class="progress-bar h-4 rounded-full text-white text-xs flex items-center justify-center" style="width: ${percentage}%; background-color: ${c.color};"></div>
                            </div>
                        `;
                        tallyResultsEl.appendChild(tallyItem);
                    });
                } else {
                    // 투표 중이거나 시작 전일 때는 결과를 가립니다.
                    tallyResultsEl.innerHTML = `<p class="text-center text-gray-500 p-4 neumorphic-shadow-inset rounded-lg">투표가 종료된 후 결과가 공개됩니다.</p>`;
                }
            };
            
            const updateUIforVotingState = () => {
                renderTally(); // 상태가 변경될 때마다 집계판을 다시 렌더링합니다.
                if (votingState === 'inactive') {
                    boardOverlay.classList.remove('hidden');
                    overlayText.textContent = '투표 시작 버튼을 눌러주세요.';
                    startVotingButton.classList.remove('hidden');
                    endVotingButton.classList.add('hidden');
                    retakeVoteButton.classList.add('hidden');
                    screenInitial.querySelector('p').textContent = "'투표 시작' 버튼을 눌러주세요.";
                } else if (votingState === 'active') {
                    boardOverlay.classList.add('hidden');
                    startVotingButton.classList.add('hidden');
                    endVotingButton.classList.remove('hidden');
                    retakeVoteButton.classList.remove('hidden');
                    screenInitial.querySelector('p').textContent = "후보자를 선택해주세요.";
                } else if (votingState === 'ended') {
                    boardOverlay.classList.remove('hidden');
                    overlayText.textContent = '투표가 종료되었습니다. 새 투표를 시작하세요.';
                    startVotingButton.classList.remove('hidden');
                    startVotingButton.textContent = '새 투표 시작';
                    endVotingButton.classList.add('hidden');
                    retakeVoteButton.classList.add('hidden');
                    screenInitial.querySelector('p').textContent = "'새 투표 시작' 버튼을 눌러주세요.";
                }
            };

            // --- 이벤트 리스너 ---
            // 파일 내보내기/불러오기 리스너 추가
            exportButton.addEventListener('click', () => {
                if (candidates.length === 0) {
                    alert('내보낼 후보자 목록이 없습니다.');
                    return;
                }
                const dataStr = JSON.stringify(candidates, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.download = 'candidate_list.json';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);
            });

            importButton.addEventListener('click', () => {
                importFileInput.click();
            });

            importFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedCandidates = JSON.parse(event.target.result);
                        if (!Array.isArray(importedCandidates)) {
                            throw new Error('JSON 파일이 후보자 목록 형식이 아닙니다.');
                        }
                        // 기본 유효성 검사
                        const isValid = importedCandidates.every(c => c.id && c.name && c.party && c.color && c.photo);
                        if (!isValid) {
                             throw new Error('후보자 데이터 일부가 누락되었습니다.');
                        }

                        if (confirm('현재 목록을 지우고 새 목록을 불러오시겠습니까? 투표 기록도 초기화됩니다.')) {
                            candidates = importedCandidates.map(c => ({...c, votes: 0})); // votes 속성 초기화
                            totalVotes = 0;
                            nextId = candidates.length > 0 ? Math.max(...candidates.map(c => c.id)) + 1 : 1;
                            saveState();
                            renderCandidates();
                            updateUIforVotingState();
                            alert('후보자 목록을 성공적으로 불러왔습니다.');
                        }
                    } catch (err) {
                        alert('파일을 불러오는 데 실패했습니다: ' + err.message);
                    } finally {
                        importFileInput.value = ''; // 다음에도 같은 파일을 선택할 수 있도록 초기화
                    }
                };
                reader.readAsText(file);
            });


            // 나머지 리스너는 이전과 동일
            startVotingButton.addEventListener('click', () => {
                if(candidates.length === 0) {
                    alert('후보자를 먼저 추가해야 투표를 시작할 수 있습니다.'); return;
                }
                if (votingState === 'ended') {
                    totalVotes = 0;
                    candidates.forEach(c => c.votes = 0);
                    saveState();
                }
                votingState = 'active';
                updateUIforVotingState();
            });
            endVotingButton.addEventListener('click', () => {
                votingState = 'ended';
                updateUIforVotingState();
            });
            retakeVoteButton.addEventListener('click', () => {
                if (votingState === 'active') { resetSimulation(); }
            });

            candidateForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('candidate-name').value;
                const party = document.getElementById('party-name').value;
                const color = document.getElementById('party-color').value;
                const photoFile = candidatePhotoInput.files[0];
                let photoDataUrl;
                if (photoFile) {
                    photoDataUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(photoFile);
                    });
                } else {
                    // 요청하신 대로, 사진이 없으면 사각형에 이름을 넣은 SVG를 생성합니다.
                    const encodedName = encodeURIComponent(name);
                    photoDataUrl = `data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e9eef2'/%3E%3Ctext x='50' y='55' font-family='Roboto, sans-serif' font-size='14' text-anchor='middle' fill='%23333'%3E${encodedName}%3C/text%3E%3C/svg%3E`;
                }
                candidates.push({ id: nextId++, name, party, color, photo: photoDataUrl, votes: 0 });
                saveState();
                renderCandidates();
                renderTally();
                candidateForm.reset();
                resetPhotoDropZone();
            });

            resetCandidatesButton.addEventListener('click', () => {
                if(confirm('모든 후보자 정보와 투표 기록이 영구적으로 삭제됩니다. 계속하시겠습니까?')) {
                    // 1. LocalStorage 데이터 삭제
                    localStorage.removeItem(STORAGE_KEY);

                    // 2. 메모리의 모든 관련 상태 변수 초기화
                    candidates = [];
                    totalVotes = 0;
                    nextId = 1;
                    
                    // 3. 현재 투표 상태 및 UI 초기화
                    resetSimulation(); // 선택된 후보, 영수증 등 UI 초기화
                    resetPhotoDropZone(); // 사진 입력 필드 초기화
                    
                    // 4. 전체 투표 프로세스 상태를 '비활성'으로 설정
                    votingState = 'inactive';
                    
                    // 5. 초기화된 데이터를 바탕으로 UI 전체를 다시 렌더링
                    renderCandidates(); // 후보자 칸을 비움
                    
                    // 6. 버튼 및 오버레이 상태 최종 업데이트
                    updateUIforVotingState(); // 집계판 비우기 포함

                    alert('모든 데이터가 초기화되었습니다.');
                }
            });
            
            // 드래그 앤 드롭 및 투표 로직 (이전과 동일)
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                photoDropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); });
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                photoDropZone.addEventListener(eventName, () => photoDropZone.classList.add('dragover'));
            });
            ['dragleave', 'drop'].forEach(eventName => {
                photoDropZone.addEventListener(eventName, () => photoDropZone.classList.remove('dragover'));
            });
            photoDropZone.addEventListener('drop', e => {
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    candidatePhotoInput.files = e.dataTransfer.files;
                    handleFile(e.dataTransfer.files[0]);
                }
            });
            candidatePhotoInput.addEventListener('change', e => {
                 if (e.target.files && e.target.files[0]) { handleFile(e.target.files[0]); }
            });

            function handleFile(file) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        photoPreview.src = e.target.result;
                        photoPreview.classList.remove('hidden');
                        dropZonePrompt.classList.add('hidden');
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert('이미지 파일만 업로드할 수 있습니다.');
                }
            }
            
            function resetPhotoDropZone() {
                 candidatePhotoInput.value = '';
                 photoPreview.classList.add('hidden');
                 photoPreview.src = '';
                 dropZonePrompt.classList.remove('hidden');
            }

             const handleCandidateSelection = (candidate, cellElement) => {
                if (votingState !== 'active' || isVotingProcess) return;
                const currentSelected = document.querySelector('.candidate-cell.selected');
                if (currentSelected) currentSelected.classList.remove('selected');
                cellElement.classList.add('selected');
                selectedCandidate = candidates.find(c => c.id === candidate.id);
                screenInitial.classList.add('hidden');
                screenVoted.classList.add('hidden');
                screenSelection.classList.remove('hidden');
                screenSelection.innerHTML = `
                    <h3 class="text-xl font-bold mb-2">선택 확인</h3>
                    <img src="${candidate.photo}" alt="${candidate.name}" class="w-24 h-24 rounded-full mx-auto border-4 border-gray-400 my-2 object-cover">
                    <p class="text-lg font-bold">${candidate.name}</p>
                    <p class="text-md text-gray-300">${candidate.party}</p>
                    <button id="vote-confirm-button" class="mt-4 bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-8 rounded-lg transition-colors">투표하기</button>
                `;
                document.getElementById('vote-confirm-button').addEventListener('click', processVote);
            };

            const processVote = () => {
                if (!selectedCandidate) return;
                isVotingProcess = true;
                selectedCandidate.votes++;
                totalVotes++;
                saveState();
                renderTally();
                screenSelection.classList.add('hidden');
                screenVoted.classList.remove('hidden');
                const now = new Date();
                receipt.innerHTML = `
                    <h4 class="font-bold text-center text-lg border-b border-dashed border-black pb-1 mb-2">투표 확인증</h4>
                    <p><strong>일시:</strong> ${now.toLocaleString('ko-KR')}</p>
                    <hr class="border-dashed border-gray-400 my-2">
                    <p class="font-bold">선택 후보:</p>
                    <p class="text-lg font-bold my-1">${selectedCandidate.name} (${selectedCandidate.party})</p>
                    <hr class="border-dashed border-gray-400 my-2">
                `;
                setTimeout(() => { receipt.classList.add('printing'); }, 500);
                setTimeout(() => {
                    if (votingState === 'active') { resetSimulation(); }
                }, 4000);
            };

            const resetSimulation = () => {
                const currentSelected = document.querySelector('.candidate-cell.selected');
                if (currentSelected) currentSelected.classList.remove('selected');
                receipt.classList.remove('printing');
                selectedCandidate = null;
                screenVoted.classList.add('hidden');
                screenSelection.classList.add('hidden');
                screenInitial.classList.remove('hidden');
                isVotingProcess = false;
            };

            // --- 초기화 ---
            loadState();
            renderCandidates();
            updateUIforVotingState();
        });
    </script>
</body>
</html>
